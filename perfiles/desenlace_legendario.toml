# Perfil igual a ejemplo_distancia, pero permitiendo LEGENDARIOS en todos los slots
# (salvo los anillos, que son fijos: Gelanillo reliquia + Anillo Insangsato épico).
# Genera además los PDF y los agrupa en un .zip.

clase = "Desenlace_legendario"
estilo = "distancia"
# Todos los slots optimizables admiten mítico y legendario (rarity 3 y 4).
# Los anillos no se ven afectados: son fijos (épico/reliquia) y no se eligen.
rarezas = ["mitico", "legendario"]
sublimaciones = ["desenlace", "ultimo_instante"]
items_fijos = [9723, 21692]    # los dos anillos con las piedras
items_excluidos = [18776]      # Emblema de poder (no disponible)
n_candidatas = 5

franjas = [20, 35, 50, 65, 80, 95, 110, 125, 140, 155, 170, 185, 200, 215, 230, 245]

# Salida: exportar PDF y agruparlos en un único .zip
pdf = true
zip = true

[base]
crit_pct = 40
